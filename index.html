    <style>
      [x-cloak] { display: none !important; }
      
      .noise-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 100;
        opacity: 0.03;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }
      
      @keyframes gradientMove {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      .bg-mesh {
        background: radial-gradient(at 0% 0%, rgba(6, 182, 212, 0.08) 0px, transparent 50%),
                    radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.06) 0px, transparent 50%),
                    radial-gradient(at 50% 50%, rgba(236, 72, 153, 0.04) 0px, transparent 70%);
        background-size: 200% 200%;
        animation: gradientMove 20s ease infinite;
      }
      .dark .bg-mesh {
        background: radial-gradient(at 0% 0%, rgba(6, 182, 212, 0.15) 0px, transparent 50%),
                    radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.12) 0px, transparent 50%),
                    radial-gradient(at 50% 0%, rgba(236, 72, 153, 0.08) 0px, transparent 50%),
                    radial-gradient(at 100% 0%, rgba(59, 130, 246, 0.1) 0px, transparent 50%);
        background-size: 200% 200%;
        animation: gradientMove 18s ease infinite;
      }

      @keyframes pulse-border {
        0%, 100% { border-color: rgba(34, 211, 238, 0.4); }
        50% { border-color: rgba(34, 211, 238, 1); }
      }
      .bounding-box {
        animation: pulse-border 2s infinite;
      }

      @keyframes scan {
        0% { transform: translateY(-100%); opacity: 0; }
        10%, 90% { opacity: 1; }
        100% { transform: translateY(200px); opacity: 0; }
      }
      @keyframes detect-box {
        0%, 100% { opacity: 0; transform: scale(0.95); }
        20%, 80% { opacity: 1; transform: scale(1); }
      }
      .detect-1 { animation: detect-box 3s infinite 0.2s; }
      .detect-2 { animation: detect-box 3.5s infinite 1.5s; }
      .detect-3 { animation: detect-box 2.5s infinite 0.8s; }
    </style>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('opacity-100', 'translate-y-0');
              entry.target.classList.remove('opacity-0', 'translate-y-8');
            }
          });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach((el) => {
            el.classList.add('opacity-0', 'translate-y-8', 'transition-all', 'duration-700');
            observer.observe(el);
        });
      });
